name: Documentation

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Documentation
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0

    - name: Setup Swift
      uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6
      with:
        swift-version: "6.2"
    
    - name: Build Documentation
      run: |
        echo "📚 Building DocC documentation..."
        
        # Create output directory
        mkdir -p docs-build
        
        # Resolve package dependencies (this will download swift-docc-plugin)
        echo "Resolving package dependencies..."
        swift package resolve
        
        # Build the package first
        echo "Building package..."
        swift build
        
        # Generate documentation using swift-docc-plugin
        # The plugin enables generate-documentation command in Swift 6.2
        echo "Generating documentation with swift-docc-plugin..."
        swift package \
          --allow-writing-to-directory docs-build \
          generate-documentation \
          --target InnoFlow \
          --disable-indexing \
          --transform-for-static-hosting \
          --hosting-base-path InnoFlow \
          --output-path docs-build

        # GitHub Pages serves the DocC root shell at /InnoFlow/, but the
        # canonical landing page lives under /documentation/innoflow/.
        # Replace the generic shell with a stable redirect so the root URL
        # behaves like a normal docs homepage.
        cat > docs-build/index.html <<'EOF'
        <!doctype html>
        <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=./documentation/innoflow/" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>InnoFlow Documentation</title>
            <script>
              window.location.replace("./documentation/innoflow/");
            </script>
          </head>
          <body>
            <p>
              Redirecting to
              <a href="./documentation/innoflow/">InnoFlow documentation</a>.
            </p>
          </body>
        </html>
        EOF
        
        echo "✅ Documentation built successfully!"
    
    - name: Setup Pages
      if: ${{ github.event_name != 'pull_request' }}
      uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d

    - name: Upload Documentation Artifact
      if: ${{ github.event_name != 'pull_request' }}
      uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
      with:
        path: docs-build

  deploy-docs:
    name: Deploy Documentation
    if: ${{ github.event_name != 'pull_request' }}
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
