name: Release Gate

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-gate:
    runs-on: macos-26
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          swift --version

      - name: Run main package tests
        run: |
          set -eo pipefail
          swift test -Xswiftc -warnings-as-errors

      - name: Run sample package tests
        run: |
          set -eo pipefail
          swift test \
            --package-path "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleAppPackage" \
            --jobs 1 \
            -Xswiftc -warnings-as-errors

      - name: Run principle gates
        run: |
          set -eo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            export INNOFLOW_REQUIRE_RELEASE_TAG=1
          fi
          "$GITHUB_WORKSPACE/scripts/principle-gates.sh"

      - name: Generate DocC
        run: |
          chmod +x Tools/generate-docc.sh
          Tools/generate-docc.sh

      - name: Package DocC artifact
        run: |
          mkdir -p .build/docc
          tar -C .build/docc -czf .build/docc/innoflow-docc.tar.gz InnoFlow

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: innoflow-release-gate
          path: |
            .build/docc/innoflow-docc.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: innoflow-release-gate
          path: release-assets

      - name: Prepare release notes
        run: |
          chmod +x Tools/extract-release-notes.sh
          Tools/extract-release-notes.sh "${GITHUB_REF_NAME}" > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: false
          files: |
            release-assets/**/*.tar.gz
