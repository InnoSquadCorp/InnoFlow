name: CD

on:
  push:
    tags:
      - '*.*.*'  # 2.0.0, 2.1.3 등의 태그 형식
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.0.0)'
        required: true
        type: string

jobs:
  release:
    name: Create Release
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 전체 히스토리 필요
    
    - name: Get Version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF#refs/tags/}"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "🎯 Release Version: ${VERSION}"
    
    - name: Validate Version Format
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Error: Version must follow semantic versioning (e.g., 2.0.0)"
          exit 1
        fi
        echo "✅ Version format validated: ${VERSION}"
    
    - name: Generate Release Notes
      id: release_notes
      run: |
        echo "📝 Generating release notes..."
        VERSION="${{ steps.get_version.outputs.version }}"
        PREV_TAG=$(
          git tag --list '*.*.*' --sort=-v:refname \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -Fxv "$VERSION" \
            | head -n 1 || true
        )
        DELIMITER="RELEASE_NOTES_END_$(date +%s)_$RANDOM"

        if [ -z "$PREV_TAG" ]; then
          CHANGE_TITLE="### What's New"
          CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGE_TITLE="### Changes since ${PREV_TAG}"
          CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi

        {
          echo "notes<<${DELIMITER}"
          echo "## 🎉 InnoFlow ${VERSION}"
          echo ""
          echo "${CHANGE_TITLE}"
          echo ""
          if [ -n "$CHANGES" ]; then
            printf '%s\n' "$CHANGES"
          else
            echo "- No user-facing changes."
          fi
          echo "${DELIMITER}"
        } >> "$GITHUB_OUTPUT"
        
        echo "✅ Release notes generated"
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: InnoFlow ${{ steps.get_version.outputs.version }}
        body: ${{ steps.release_notes.outputs.notes }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
