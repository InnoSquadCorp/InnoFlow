name: Release Gate

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: macos-26
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Show Xcode version
        run: |
          xcodebuild -version
          swift --version

      - name: Run main package tests
        run: |
          set -eo pipefail
          # Keep the release gate under the same deterministic scheduling
          # contract as CI and the local principle gates.
          swift test \
            --jobs 1 \
            --no-parallel \
            -Xswiftc -warnings-as-errors

      - name: Run sample package tests
        run: |
          set -eo pipefail
          swift test \
            --package-path "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleAppPackage" \
            --jobs 1 \
            -Xswiftc -warnings-as-errors

      - name: Run principle gates
        run: |
          set -eo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            export INNOFLOW_REQUIRE_RELEASE_TAG=1
          fi
          "$GITHUB_WORKSPACE/scripts/principle-gates.sh"

      - name: Generate DocC
        run: |
          chmod +x Tools/generate-docc.sh
          Tools/generate-docc.sh

      - name: Package DocC artifact
        run: |
          mkdir -p .build/docc
          tar -C .build/docc -czf .build/docc/innoflow-docc.tar.gz InnoFlow

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: innoflow-release-gate
          path: |
            .build/docc/innoflow-docc.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: innoflow-release-gate
          path: release-assets

      - name: Prepare release notes
        run: |
          chmod +x Tools/extract-release-notes.sh
          Tools/extract-release-notes.sh "${GITHUB_REF_NAME}" > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: false
          files: |
            release-assets/**/*.tar.gz
