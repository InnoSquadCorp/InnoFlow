name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Lint sources
        run: |
          set -eo pipefail
          xcrun swift --version
          swift format lint --strict --recursive Sources Tests Examples

  tests:
    name: Package Tests
    runs-on: macos-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run package tests
        run: |
          set -eo pipefail
          swift test --package-path "$GITHUB_WORKSPACE" -Xswiftc -warnings-as-errors

      - name: Run sample package tests
        run: |
          set -eo pipefail
          swift test --package-path "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleAppPackage" -Xswiftc -warnings-as-errors

  package-builds:
    name: Package Build (${{ matrix.platform }})
    runs-on: macos-latest
    needs: tests
    strategy:
      fail-fast: false
      matrix:
        platform: [macOS, iOS, tvOS, watchOS, visionOS]

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build package scheme for ${{ matrix.platform }}
        run: |
          set -eo pipefail
          xcodebuild \
            -scheme InnoFlow-Package \
            -destination "generic/platform=${{ matrix.platform }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

  principle-gates:
    name: Principle Gates
    runs-on: macos-latest
    needs: [tests, package-builds]

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run principle gates
        run: |
          set -eo pipefail
          "$GITHUB_WORKSPACE/scripts/principle-gates.sh"

  sample-package-builds:
    name: Sample Package Build (visionOS)
    runs-on: macos-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve visionOS simulator triple
        id: vision-triple
        run: |
          set -eo pipefail
          HOST_ARCH="$(uname -m)"
          VISION_SDK_VERSION="$(xcrun --sdk xrsimulator --show-sdk-version)"
          if [[ -z "$VISION_SDK_VERSION" ]]; then
            echo "Unable to resolve a visionOS simulator SDK version" >&2
            exit 1
          fi
          echo "triple=${HOST_ARCH}-apple-xros${VISION_SDK_VERSION}-simulator" >> "$GITHUB_OUTPUT"

      - name: Build sample package for visionOS
        run: |
          set -eo pipefail
          swift build \
            --package-path "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleAppPackage" \
            --triple "${{ steps.vision-triple.outputs.triple }}" \
            -Xswiftc -warnings-as-errors

  sample-build:
    name: Canonical Sample Build
    runs-on: macos-latest
    needs: principle-gates

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build canonical sample
        run: |
          set -eo pipefail
          xcodebuild \
            -project "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleApp.xcodeproj" \
            -scheme InnoFlowSampleApp \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

  sample-ui-tests:
    name: Canonical Sample UI Smoke Tests
    runs-on: macos-latest
    needs: sample-build

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve iOS simulator destination
        id: ios-simulator
        run: |
          set -eo pipefail
          IOS_SIMULATOR_ID="$(
            xcrun simctl list devices available -j | /usr/bin/python3 -c '
          import json
          import re
          import sys

          data = json.load(sys.stdin)["devices"]
          candidates = []
          for runtime, devices in data.items():
              if "iOS" not in runtime:
                  continue
              match = re.search(r"iOS[- ](\d+)(?:[-.](\d+))?", runtime)
              if not match:
                  continue
              version = (int(match.group(1)), int(match.group(2) or 0))
              for device in devices:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      candidates.append((version, device["name"], device["udid"]))

          if not candidates:
              sys.exit(1)

          candidates.sort()
          print(candidates[-1][2])
          '
          )"
          if [[ -z "$IOS_SIMULATOR_ID" ]]; then
            echo "Unable to resolve an available iPhone simulator" >&2
            exit 1
          fi
          echo "id=$IOS_SIMULATOR_ID" >> "$GITHUB_OUTPUT"

      - name: Run canonical sample UI smoke tests
        run: |
          set -eo pipefail
          xcodebuild \
            -project "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleApp.xcodeproj" \
            -scheme InnoFlowSampleApp \
            -destination "${{ steps.ios-simulator.outputs.id }}" \
            -only-testing:InnoFlowSampleAppUITests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test
