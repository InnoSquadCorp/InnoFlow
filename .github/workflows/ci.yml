name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.2"

    - name: Lint (swift-format)
      run: |
        set -eo pipefail
        echo "🔍 Running style lint..."
        swift format lint --recursive Sources Tests Examples

  test:
    name: Build and Test
    runs-on: macos-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.2"

    - name: Build
      run: |
        set -eo pipefail
        echo "🔨 Building InnoFlow..."
        swift build
        echo "✅ Build completed successfully!"

    - name: Test
      run: |
        set -eo pipefail
        echo "🧪 Running tests..."
        echo ""
        swift test --enable-code-coverage --parallel
        echo ""
        echo "✅ All tests passed!"

    - name: Test Summary
      if: always()
      run: |
        echo "## 🧪 Build & Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Job status: **${{ job.status }}**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ job.status }}" = "success" ]; then
          echo "- ✅ Build and tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Code coverage enabled" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ Build or tests failed" >> $GITHUB_STEP_SUMMARY
        fi

  build-examples:
    name: Build Examples
    runs-on: macos-latest
    needs:
    - lint
    - test

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.2"

    - name: Install xcpretty
      run: |
        set -eo pipefail
        echo "📦 Installing xcpretty..."
        gem install xcpretty --no-document
        echo "✅ xcpretty installed"

    - name: Build example apps
      run: |
        set -eo pipefail
        echo "📱 Building example apps..."
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🔨 Building CounterApp..."
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        cd Examples/CounterApp
        xcodebuild -workspace CounterApp.xcworkspace -scheme CounterApp -destination 'platform=iOS Simulator,name=iPhone 16' clean build | xcpretty
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🔨 Building TodoApp..."
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        cd ../TodoApp
        xcodebuild -workspace TodoApp.xcworkspace -scheme TodoApp -destination 'platform=iOS Simulator,name=iPhone 16' clean build | xcpretty
        echo ""
        echo "✅ All example apps built successfully!"
