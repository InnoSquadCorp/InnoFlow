name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: macos-26

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Lint sources
        run: |
          set -eo pipefail
          xcrun swift --version
          # Pin swift-format major version so style drift surfaces as a lint
          # failure rather than silently re-formatting under a newer toolchain.
          SWIFT_FORMAT_VERSION_OUTPUT="$(swift format --version)"
          SWIFT_FORMAT_VERSION="$(
            printf '%s\n' "${SWIFT_FORMAT_VERSION_OUTPUT}" |
              awk '{ for (i = 1; i <= NF; i++) if ($i ~ /^[0-9]+([.][0-9]+)*$/) { print $i; exit } }'
          )"
          echo "swift-format: ${SWIFT_FORMAT_VERSION_OUTPUT}"
          case "${SWIFT_FORMAT_VERSION}" in
            6.*|60[0-9].*) ;;
            *)
              echo "::error::Unsupported swift-format version ${SWIFT_FORMAT_VERSION_OUTPUT} (expected 6.x or 60x.x)"
              exit 1
              ;;
          esac
          swift format lint --strict --recursive Sources Tests Examples

  tests:
    name: Package Tests (Core)
    runs-on: macos-26
    needs: lint

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run package tests
        run: |
          set -eo pipefail
          swift test --package-path "$GITHUB_WORKSPACE" -Xswiftc -warnings-as-errors

  thread-sanitizer:
    name: Package Tests (ThreadSanitizer)
    runs-on: macos-26
    needs: lint

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run package tests with ThreadSanitizer
        run: |
          set -eo pipefail
          swift test --package-path "$GITHUB_WORKSPACE" --sanitize=thread -Xswiftc -warnings-as-errors

  sample-tests:
    name: Package Tests (Sample)
    runs-on: macos-26
    needs: lint

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run sample package tests
        run: |
          set -eo pipefail
          swift test --package-path "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleAppPackage" --jobs 1 -Xswiftc -warnings-as-errors

  package-builds:
    name: Package Build (${{ matrix.platform }})
    runs-on: macos-26
    needs: tests
    strategy:
      fail-fast: false
      matrix:
        platform: [macOS, iOS, tvOS, watchOS, visionOS]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build package scheme for ${{ matrix.platform }}
        run: |
          set -eo pipefail
          xcodebuild \
            -scheme InnoFlow-Package \
            -destination "generic/platform=${{ matrix.platform }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

  principle-gates:
    name: Principle Gates
    runs-on: macos-26
    needs: [tests, thread-sanitizer, sample-tests, package-builds]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run principle gates
        run: |
          set -eo pipefail
          "$GITHUB_WORKSPACE/scripts/principle-gates.sh"

  sample-package-builds:
    name: Sample Package Build (visionOS)
    runs-on: macos-26
    needs: sample-tests

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build sample package for visionOS
        run: |
          set -eo pipefail
          cd "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleAppPackage"
          xcodebuild \
            -jobs 1 \
            -scheme InnoFlowSampleAppFeature \
            -destination 'generic/platform=visionOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

  sample-build:
    name: Canonical Sample Build
    runs-on: macos-26
    needs: principle-gates

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build canonical sample
        run: |
          set -eo pipefail
          xcodebuild \
            -jobs 1 \
            -project "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleApp.xcodeproj" \
            -scheme InnoFlowSampleApp \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

  address-sanitizer:
    name: Package Tests (AddressSanitizer)
    runs-on: macos-26
    needs: lint
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-asan'))

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run package tests with AddressSanitizer
        run: |
          set -eo pipefail
          swift test --package-path "$GITHUB_WORKSPACE" --sanitize=address -Xswiftc -warnings-as-errors

  sample-ui-tests:
    name: Canonical Sample UI Smoke Tests
    runs-on: macos-26
    needs: sample-build

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve iOS simulator destination
        id: ios-simulator
        run: |
          set -eo pipefail
          IOS_SIMULATOR_UDID="$(
            xcrun simctl list devices available -j | /usr/bin/python3 -c '
          import json
          import re
          import sys

          data = json.load(sys.stdin)["devices"]
          candidates = []
          for runtime, devices in data.items():
              if "iOS" not in runtime:
                  continue
              match = re.search(r"iOS[- ](\d+)(?:[-.](\d+))?", runtime)
              if not match:
                  continue
              version = (int(match.group(1)), int(match.group(2) or 0))
              for device in devices:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      candidates.append((version, device["name"], device["udid"]))

          if not candidates:
              sys.exit(1)

          candidates.sort()
          print(candidates[-1][2])
          '
          )"
          if [[ -z "$IOS_SIMULATOR_UDID" ]]; then
            echo "Unable to resolve an available iPhone simulator" >&2
            exit 1
          fi
          echo "udid=$IOS_SIMULATOR_UDID" >> "$GITHUB_OUTPUT"

      - name: Run canonical sample UI smoke tests
        run: |
          set -eo pipefail
          xcodebuild \
            -jobs 1 \
            -project "$GITHUB_WORKSPACE/Examples/InnoFlowSampleApp/InnoFlowSampleApp.xcodeproj" \
            -scheme InnoFlowSampleApp \
            -destination "platform=iOS Simulator,id=${{ steps.ios-simulator.outputs.udid }}" \
            -only-testing:InnoFlowSampleAppUITests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test
